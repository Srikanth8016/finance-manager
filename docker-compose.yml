services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-manager
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override Ollama URL so container can reach Ollama on the host machine
      # On Docker Desktop (Windows/Mac) host.docker.internal resolves to the host.
      # If AI_PROVIDER=gemini this is ignored.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    # Allows container to reach host services (Ollama) on Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
